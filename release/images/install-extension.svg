<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img" aria-labelledby="title desc">
  <title id="title">扩展管理页安装示意</title>
  <desc id="desc">在浏览器扩展管理页打开开发者模式，然后点击加载已解压的扩展程序。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1120" height="700" fill="#f4f7fb"/>
  <rect x="88" y="70" width="944" height="560" rx="20" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="88" y="70" width="944" height="68" rx="20" fill="#eef3f8"/>
  <circle cx="122" cy="104" r="8" fill="#ef4444"/>
  <circle cx="148" cy="104" r="8" fill="#f59e0b"/>
  <circle cx="174" cy="104" r="8" fill="#22c55e"/>
  <rect x="218" y="88" width="420" height="32" rx="16" fill="#ffffff"/>
  <text x="238" y="109" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#64748b">chrome://extensions/</text>
  <text x="132" y="184" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#111827">扩展程序</text>
  <rect x="788" y="166" width="156" height="40" rx="20" fill="#2563eb"/>
  <circle cx="924" cy="186" r="17" fill="#ffffff"/>
  <text x="808" y="191" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#ffffff">开发者模式</text>
  <circle cx="760" cy="186" r="18" fill="#f97316"/>
  <text x="754" y="192" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#ffffff">1</text>
  <path d="M778 186 L788 186" stroke="#f97316" stroke-width="4" stroke-linecap="round"/>
  <rect x="132" y="242" width="246" height="48" rx="8" fill="#1d4ed8"/>
  <text x="166" y="272" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" fill="#ffffff">加载已解压的扩展程序</text>
  <circle cx="106" cy="266" r="18" fill="#f97316"/>
  <text x="100" y="272" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#ffffff">2</text>
  <path d="M124 266 L132 266" stroke="#f97316" stroke-width="4" stroke-linecap="round"/>
  <rect x="402" y="242" width="144" height="48" rx="8" fill="#e5e7eb"/>
  <text x="436" y="272" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" fill="#374151">打包扩展</text>
  <rect x="132" y="338" width="360" height="186" rx="14" fill="#ffffff" stroke="#d7dee8"/>
  <rect x="160" y="366" width="72" height="72" rx="16" fill="#dbeafe"/>
  <text x="184" y="412" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#2563eb">Ray</text>
  <text x="252" y="390" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#111827">小光Ray房管助手</text>
  <text x="252" y="424" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#64748b">已加载到浏览器</text>
  <rect x="252" y="452" width="86" height="30" rx="15" fill="#dcfce7"/>
  <text x="273" y="472" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#166534">已启用</text>
  <rect x="574" y="338" width="362" height="186" rx="14" fill="#f8fafc" stroke="#d7dee8" stroke-dasharray="7 8"/>
  <text x="620" y="406" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#111827">安装完成后</text>
  <text x="620" y="444" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" fill="#475569">刷新直播间页面，右侧会出现助手面板。</text>
  <text x="620" y="480" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" fill="#475569">插件内部开发者模式默认关闭。</text>
</svg>
