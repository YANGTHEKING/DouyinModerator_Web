<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img" aria-labelledby="title desc">
  <title id="title">AI 弹幕设置示意</title>
  <desc id="desc">AI 弹幕支持普通互动、杂谈话题和安慰鼓励，可以选择近期热门并立即发送。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1120" height="700" fill="#f4f7fb"/>
  <rect x="120" y="66" width="880" height="568" rx="20" fill="#ffffff" filter="url(#shadow)"/>
  <text x="164" y="122" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#111827">AI 弹幕生成</text>
  <text x="164" y="158" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" fill="#64748b">选择生成类型、风格和话题范围，生成后可加入弹幕池，也可立即发送。</text>
  <text x="164" y="214" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#111827">生成类型</text>
  <rect x="164" y="232" width="146" height="42" rx="10" fill="#e0f2fe" stroke="#38bdf8"/>
  <text x="205" y="259" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#075985">普通互动</text>
  <rect x="328" y="232" width="146" height="42" rx="10" fill="#dcfce7" stroke="#22c55e"/>
  <text x="369" y="259" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#166534">杂谈话题</text>
  <rect x="492" y="232" width="146" height="42" rx="10" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="533" y="259" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#92400e">安慰鼓励</text>
  <text x="164" y="322" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#111827">杂谈设置</text>
  <rect x="164" y="340" width="176" height="46" rx="10" fill="#f8fafc" stroke="#dbe3ef"/>
  <text x="188" y="369" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#334155">对象：主播</text>
  <rect x="356" y="340" width="176" height="46" rx="10" fill="#f8fafc" stroke="#dbe3ef"/>
  <text x="380" y="369" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#334155">分类：游戏</text>
  <rect x="548" y="340" width="176" height="46" rx="10" fill="#fff7ed" stroke="#fb923c"/>
  <text x="572" y="369" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#9a3412">近期热门</text>
  <path d="M724 363 C790 365 824 390 842 438" fill="none" stroke="#f97316" stroke-width="5" stroke-linecap="round"/>
  <rect x="756" y="438" width="186" height="92" rx="12" fill="#fff7ed" stroke="#fb923c"/>
  <text x="782" y="470" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#9a3412">会真实搜索热点</text>
  <text x="782" y="498" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#9a3412">等待时间会更长</text>
  <text x="164" y="444" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#111827">示例输出</text>
  <rect x="164" y="464" width="528" height="72" rx="12" fill="#f8fafc" stroke="#dbe3ef"/>
  <text x="190" y="506" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" fill="#111827">最近大家都在玩什么游戏呀，主播有没有想试试的？</text>
  <rect x="164" y="566" width="162" height="44" rx="10" fill="#2563eb"/>
  <text x="202" y="594" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#ffffff">加入弹幕池</text>
  <rect x="344" y="566" width="162" height="44" rx="10" fill="#111827"/>
  <text x="390" y="594" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#ffffff">立即发送</text>
  <rect x="524" y="566" width="162" height="44" rx="10" fill="#f1f5f9" stroke="#dbe3ef"/>
  <text x="568" y="594" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#334155">重新生成</text>
</svg>
