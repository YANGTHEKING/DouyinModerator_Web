  <rect x="430" y="196" width="496" height="54" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <path d="M452 214 h34 l10 10 h44 a8 8 0 0 1 8 8 v8 a8 8 0 0 1 -8 8 h-88 a8 8 0 0 1 -8 -8 v-18 a8 8 0 0 1 8 -8z" fill="#fbbf24"/>
  <text x="570" y="231" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#1e3a8a">xiaoguang-ray-moderator-v0.1.0-unpacked</text>
  <text x="570" y="276" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#64748b">选择这一层目录</text>
